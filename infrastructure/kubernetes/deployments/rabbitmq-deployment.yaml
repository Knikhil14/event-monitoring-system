---
# RabbitMQ StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: event-rabbitmq
  namespace: event-monitoring
  labels:
    app: rabbitmq
spec:
  serviceName: event-rabbitmq
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3.12-management-alpine
        ports:
        - containerPort: 5672
          name: amqp
        - containerPort: 15672
          name: http
        - containerPort: 15692
          name: metrics
        env:
        - name: RABBITMQ_DEFAULT_USER
          valueFrom:
            secretKeyRef:
              name: rabbitmq-secret
              key: username
        - name: RABBITMQ_DEFAULT_PASS
          valueFrom:
            secretKeyRef:
              name: rabbitmq-secret
              key: password
        - name: RABBITMQ_ERLANG_COOKIE
          valueFrom:
            secretKeyRef:
              name: rabbitmq-secret
              key: erlang-cookie
        - name: RABBITMQ_VM_MEMORY_HIGH_WATERMARK
          value: "0.8"
        volumeMounts:
        - name: rabbitmq-data
          mountPath: /var/lib/rabbitmq
        - name: rabbitmq-config
          mountPath: /etc/rabbitmq/conf.d/
        livenessProbe:
          exec:
            command:
            - rabbitmqctl
            - status
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          exec:
            command:
            - rabbitmqctl
            - wait
            - /var/lib/rabbitmq/pid
          initialDelaySeconds: 20
          periodSeconds: 10
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: rabbitmq-config
        configMap:
          name: rabbitmq-config
  volumeClaimTemplates:
  - metadata:
      name: rabbitmq-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi
---
# RabbitMQ Service (for internal communication)
apiVersion: v1
kind: Service
metadata:
  name: event-rabbitmq
  namespace: event-monitoring
  labels:
    app: rabbitmq
spec:
  ports:
  - port: 5672
    targetPort: 5672
    name: amqp
  - port: 15672
    targetPort: 15672
    name: management
  selector:
    app: rabbitmq
  type: ClusterIP
---
# RabbitMQ Headless Service (for statefulset)
apiVersion: v1
kind: Service
metadata:
  name: event-rabbitmq-headless
  namespace: event-monitoring
  labels:
    app: rabbitmq
spec:
  ports:
  - port: 5672
    name: amqp
  - port: 15672
    name: management
  clusterIP: None
  selector:
    app: rabbitmq
---
# RabbitMQ LoadBalancer Service (for external management access - optional)
apiVersion: v1
kind: Service
metadata:
  name: event-rabbitmq-external
  namespace: event-monitoring
  annotations:
    # For AWS
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    # For development only - restrict in production
    service.beta.kubernetes.io/aws-load-balancer-internal: "false"
spec:
  ports:
  - port: 15672
    targetPort: 15672
    name: management
    nodePort: 31672
  selector:
    app: rabbitmq
  type: LoadBalancer